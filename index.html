<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="TwinLabs — 모바일 앱 스튜디오. 앱 지원 및 정책 페이지 안내." />
  <title>TwinLabs</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      line-height: 1.7;
      background: #f7f7f8;
      color: #1f2937;
    }
    .wrap {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 24px 48px;
    }
    .hero {
      padding: 32px 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.75rem;
      line-height: 1.25;
    }
    .lead {
      margin: 0;
      color: #4b5563;
      font-size: 1.05rem;
    }
    h2 {
      margin: 36px 0 14px;
      font-size: 1.15rem;
    }
    .apps {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .app-card {
      padding: 22px 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }
    .app-card h3 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }
    .app-card p {
      margin: 0 0 14px;
      color: #4b5563;
      font-size: 0.98rem;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      font-size: 0.95rem;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .contact {
      margin-top: 32px;
      padding: 22px 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
      font-size: 0.98rem;
      color: #4b5563;
    }
    .footer {
      margin-top: 28px;
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1>TwinLabs</h1>
      <p class="lead">
        TwinLabs는 일상에 닿는 도구를 만드는 소규모 스튜디오입니다.
      </p>
    </header>

    <div class="contact">
      <strong>문의</strong><br />
      일반 문의: <a href="mailto:hello@twinlabs.studio">hello@twinlabs.studio</a>
    </div>

    <p class="footer">© 2026 TwinLabs</p>
  </div>
</body>
</html>
